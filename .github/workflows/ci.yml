# CI/CD 自动化流水线配置
name: Python CI  # 流水线名称，会显示在Actions里

# 触发条件：代码推送到main分支时，自动运行流水线
on:
  push:
    branches: [ main ]

# 流水线要执行的任务
jobs:
  build-and-test:
    runs-on: ubuntu-latest  # 用Ubuntu系统运行，免费稳定

    steps:
      # 步骤1：拉取仓库里的代码到运行环境
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：安装Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 步骤3：升级pip，保证环境稳定
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      # 步骤4：运行单元测试（核心步骤！）
      - name: Run tests
        run: |
          python -m pytest test_calculator.py -v
